<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back - Sweet Crumbs Bakery</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #c2956e;
            --primary-hover: #b08156;
            --dark-esp: #241409;
            --cream: #fbf9f6;
            --text-muted: #d0c5bc;
            --glass-bg: rgba(36, 20, 9, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('/images/Cappuccino.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated background floating shapes */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(194, 149, 110, 0.25) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
            animation: floatGlow 15s infinite alternate ease-in-out;
        }
        .bg-glow-1 { top: 10%; left: 15%; }
        .bg-glow-2 { bottom: 10%; right: 15%; animation-delay: -5s; }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.2); }
        }

        .login-container {
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .logo-wrapper img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(194, 149, 110, 0.4);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-wrapper:hover img {
            transform: rotate(360deg) scale(1.05);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
            transition: color 0.3s;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--cream);
            outline: none;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(194, 149, 110, 0.25);
        }

        input:focus + i {
            color: var(--cream);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: var(--dark-esp);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(194, 149, 110, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(194, 149, 110, 0.55);
            background: linear-gradient(135deg, var(--primary-hover) 0%, #946944 100%);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Notifications & Error Handling */
        .notification {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
            text-align: left;
        }

        .notification.error {
            background: rgba(239, 83, 80, 0.15);
            border: 1px solid rgba(239, 83, 80, 0.3);
            color: #ff8a80;
        }

        .notification.success {
            background: rgba(102, 187, 106, 0.15);
            border: 1px solid rgba(102, 187, 106, 0.3);
            color: #b9f6ca;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            margin-left: 5px;
        }

        .footer-link a:hover {
            color: var(--cream);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="login-container">
    <div class="glass-card">
        <div class="logo-wrapper">
            <img src="/images/bakery.png" alt="Sweet Crumbs Logo"/>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Enter details to enter Sweet Crumbs</p>

        <!-- Message Containers -->
        <div id="errorMessage" class="notification error" style="display: none;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span class="msg-text"></span>
        </div>
        <div id="successMessage" class="notification success" style="display: none;">
            <i class="bi bi-check-circle-fill"></i>
            <span class="msg-text"></span>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="Username" required/>
                <i class="bi bi-person"></i>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Password" required/>
                <i class="bi bi-shield-lock"></i>
            </div>

            <button class="btn-submit" type="submit">Sign In</button>
        </form>

        <div class="footer-link">
            Don't have an account?<a href="register.html">Create One</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        fetch('/api/users/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username: username, password: password })
        })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .then(data => {
                successMessage.querySelector('.msg-text').textContent = 'Login successful! Redirecting...';
                successMessage.style.display = 'flex';

                // Store user details in localStorage
                localStorage.setItem('user', JSON.stringify(data));

                // Redirect to index page after a short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            })
            .catch(error => {
                errorMessage.querySelector('.msg-text').textContent = error.message || 'Login failed. Please try again.';
                errorMessage.style.display = 'flex';
            });
    });
</script>
</body>
</html>
