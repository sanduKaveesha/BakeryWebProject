<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Sweet Crumbs Bakery</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #c2956e;
            --primary-hover: #b08156;
            --dark-esp: #241409;
            --cream: #fbf9f6;
            --text-muted: #d0c5bc;
            --glass-bg: rgba(36, 20, 9, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('/images/Cappuccino.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 20px;
        }

        /* Subtle animated background floating shapes */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(194, 149, 110, 0.25) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
            animation: floatGlow 15s infinite alternate ease-in-out;
        }
        .bg-glow-1 { top: 5%; left: 10%; }
        .bg-glow-2 { bottom: 5%; right: 10%; animation-delay: -5s; }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.2); }
        }

        .register-container {
            z-index: 1;
            width: 100%;
            max-width: 460px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .glass-card:hover {
            transform: translateY(-3px);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--cream);
            font-size: 2.1rem;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 28px;
            font-weight: 300;
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
            transition: color 0.3s;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 13px 16px 13px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--cream);
            outline: none;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(194, 149, 110, 0.25);
        }

        input:focus + i {
            color: var(--cream);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: var(--dark-esp);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(194, 149, 110, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(194, 149, 110, 0.55);
            background: linear-gradient(135deg, var(--primary-hover) 0%, #946944 100%);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Notifications & Error Handling */
        .notification {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
            text-align: left;
        }

        .notification.error {
            background: rgba(239, 83, 80, 0.15);
            border: 1px solid rgba(239, 83, 80, 0.3);
            color: #ff8a80;
        }

        .notification.success {
            background: rgba(102, 187, 106, 0.15);
            border: 1px solid rgba(102, 187, 106, 0.3);
            color: #b9f6ca;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            margin-left: 5px;
        }

        .footer-link a:hover {
            color: var(--cream);
            text-decoration: underline;
        }

        /* Responsive overrides */
        @media (max-width: 480px) {
            .row-grid {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="register-container">
    <div class="glass-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join Sweet Crumbs Bakery today</p>

        <!-- Message Containers -->
        <div id="errorMessage" class="notification error" style="display: none;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span class="msg-text"></span>
        </div>
        <div id="successMessage" class="notification success" style="display: none;">
            <i class="bi bi-check-circle-fill"></i>
            <span class="msg-text"></span>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="Username" required/>
                <i class="bi bi-person"></i>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Password" required/>
                <i class="bi bi-shield-lock"></i>
            </div>

            <div class="input-group">
                <input type="email" id="email" name="email" placeholder="Email Address" required/>
                <i class="bi bi-envelope"></i>
            </div>

            <div class="input-group">
                <input type="tel" id="telephone" name="telephone" placeholder="Telephone (e.g. 0771234567)"/>
                <i class="bi bi-telephone"></i>
            </div>

            <div class="row-grid">
                <div class="input-group">
                    <input type="text" id="firstName" name="firstName" placeholder="First Name"/>
                    <i class="bi bi-person-vcard"></i>
                </div>

                <div class="input-group">
                    <input type="text" id="lastName" name="lastName" placeholder="Last Name"/>
                    <i class="bi bi-person-vcard"></i>
                </div>
            </div>

            <button class="btn-submit" type="submit">Register</button>
        </form>

        <div class="footer-link">
            Already have an account?<a href="login.html">Sign In</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const email = document.getElementById('email').value;
        const telephone = document.getElementById('telephone').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;

        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        fetch('/api/users/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username: username,
                password: password,
                email: email,
                telephone: telephone,
                firstName: firstName,
                lastName: lastName
            })
        })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    return response.text().then(text => { throw new Error(text); });
                }
            })
            .then(data => {
                successMessage.querySelector('.msg-text').textContent = 'Registration successful! Logging you in...';
                successMessage.style.display = 'flex';

                // Store user details in localStorage
                localStorage.setItem('user', JSON.stringify(data));

                // Redirect to index page after a short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            })
            .catch(error => {
                errorMessage.querySelector('.msg-text').textContent = error.message || 'Registration failed. Please try again.';
                errorMessage.style.display = 'flex';
            });
    });
</script>
</body>
</html>
